<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Playwrong Plugins</title>
  <style>
    :root {
      --bg: #f2f4f7;
      --card: #ffffff;
      --text: #111827;
      --muted: #475467;
      --border: #d0d5dd;
      --primary: #155eef;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-width: 420px;
      max-width: 520px;
      background: linear-gradient(165deg, #eef4ff 0%, var(--bg) 45%);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Helvetica, Arial;
    }
    .container { padding: 12px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
    }
    h1 { margin: 0 0 8px; font-size: 18px; }
    h2 { margin: 0 0 8px; font-size: 14px; }
    label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 4px; }
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 12px;
      margin-bottom: 8px;
      background: #fff;
    }
    .toolbar { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    button {
      border: 0;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }
    button.secondary { background: #344054; }
    button.danger { background: var(--danger); }
    .muted { color: var(--muted); font-size: 12px; }
    .ok { color: #067647; font-size: 12px; }
    .error { color: #b42318; font-size: 12px; }
    .status-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 4px;
      margin-bottom: 4px;
    }
    .status-pill {
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 700;
      background: #e4e7ec;
      color: #344054;
    }
    .status-pill.connected {
      background: #ecfdf3;
      color: #067647;
    }
    .status-pill.warning {
      background: #fffaeb;
      color: #b54708;
    }
    .status-pill.error {
      background: #fef3f2;
      color: #b42318;
    }
    .plugin-list { display: grid; gap: 8px; }
    .plugin-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      background: #fff;
    }
    .plugin-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      margin-bottom: 4px;
      gap: 6px;
    }
    .plugin-meta {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
      word-break: break-all;
    }
    pre {
      margin: 8px 0 0;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #f8fafc;
      padding: 8px;
      max-height: 200px;
      overflow: auto;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Playwrong Plugin Manager</h1>

    <section class="card">
      <h2>Server Endpoint</h2>
      <label for="endpointInput">HTTP endpoint</label>
      <input id="endpointInput" type="text" placeholder="http://127.0.0.1:7878" />
      <div class="toolbar">
        <button id="saveEndpointBtn">Save Endpoint</button>
        <button id="checkConnectionBtn" class="secondary">Check Connection</button>
      </div>
      <div id="endpointMsg" class="muted"></div>
      <div class="status-line">
        <div id="connectionBadge" class="status-pill">Unknown</div>
      </div>
      <div id="connectionDetail" class="muted"></div>
    </section>

    <section class="card">
      <h2>Install From Git</h2>
      <label for="repoUrl">Repo URL</label>
      <input id="repoUrl" type="text" placeholder="https://github.com/org/playwrong-plugin.git" />
      <label for="repoRef">Ref (optional)</label>
      <input id="repoRef" type="text" placeholder="main" />
      <label style="display:flex;align-items:center;gap:6px;color:var(--text);margin:0 0 8px;">
        <input id="repoEnabled" type="checkbox" checked /> enable after install
      </label>
      <div class="toolbar">
        <button id="installBtn">Install</button>
      </div>
      <div id="installMsg" class="muted"></div>
    </section>

    <section class="card">
      <h2>Installed Plugins</h2>
      <div class="toolbar">
        <button id="refreshBtn" class="secondary">Refresh</button>
        <button id="generateBtn">Generate</button>
        <button id="applyBtn">Generate + Build</button>
      </div>
      <div id="globalMsg" class="muted" style="margin-top:6px"></div>
      <div id="pluginList" class="plugin-list" style="margin-top:8px"></div>
      <pre id="rawOut"></pre>
    </section>
  </div>
  <script type="module" src="./popup.js"></script>
</body>
</html>
